apiVersion: v1
kind: Namespace
metadata:
  name: maas-db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: maas-postgres-pvc
  namespace: maas-db
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: maas-postgres-credentials
  namespace: maas-db
type: Opaque
stringData:
  POSTGRES_USER: maas
  POSTGRES_PASSWORD: maas-db-password
  POSTGRES_DB: maas
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-postgres
  namespace: maas-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maas-postgres
  template:
    metadata:
      labels:
        app: maas-postgres
    spec:
      containers:
      - name: postgres
        image: registry.redhat.io/rhel9/postgresql-16:latest
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: maas-postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maas-postgres-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: maas-postgres-credentials
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/pgsql/data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: maas-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: maas-postgres
  namespace: maas-db
spec:
  selector:
    app: maas-postgres
  ports:
  - port: 5432
    targetPort: 5432
