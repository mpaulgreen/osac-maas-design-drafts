apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: facebook-opt-125m-simulated
  namespace: llm
spec:
  model:
    name: facebook/opt-125m
    uri: hf://sshleifer/tiny-gpt2
  storageInitializer:
    enabled: false
  replicas: 1
  router:
    route: {}
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
  template:
    containers:
    - name: main
      image: ghcr.io/llm-d/llm-d-inference-sim:v0.7.1
      imagePullPolicy: Always
      command: ["/app/llm-d-inference-sim"]
      args:
      - --port
      - "8000"
      - --model
      - facebook/opt-125m
      - --mode
      - random
      - --ssl-certfile
      - /var/run/kserve/tls/tls.crt
      - --ssl-keyfile
      - /var/run/kserve/tls/tls.key
      env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.name
      - name: POD_NAMESPACE
        valueFrom:
          fieldRef:
            apiVersion: v1
            fieldPath: metadata.namespace
      ports:
      - containerPort: 8000
        name: https
        protocol: TCP
      livenessProbe:
        httpGet:
          path: /health
          port: https
          scheme: HTTPS
      readinessProbe:
        httpGet:
          path: /ready
          port: https
          scheme: HTTPS
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
      - mountPath: /var/run/kserve/tls
        name: tls-certs
        readOnly: true
